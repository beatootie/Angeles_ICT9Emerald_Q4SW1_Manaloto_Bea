<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: white;
            font-family: Arial, sans-serif;
        }
        
        .login-container {
            margin: 40px auto;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 40px;
            max-width: 400px;
        }
        
        .btn-custom {
        background-color: plum;
        }
        
        h1 {
            color: plum;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-container">
                    <h1>LOGIN FORM</h1>
                    
                    <div id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                        </div>
                        <button type="button" class="btn btn-custom onclick="login()">
                            LOGIN
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <script>
        var CorrectUser = "Emerald";
        var CorrectPass = "12345";
        var attempt = 0;
        var MaxTry = 3;

        function login() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            
            while(attempt < MaxTry){
                if(username === CorrectUser && password === CorrectPass){
                    alert("Login Successful");
                    break;
                } else {
                    attempt++;
                    if(attempt < MaxTry){
                        alert("Login Failed. Attempts left: " + (MaxTry - attempt));
                    } else {
                        alert("Account Locked. Too many failed attempts");
                    }
                    return;
                }
            }
        }
    </script>
</body>
</html>
